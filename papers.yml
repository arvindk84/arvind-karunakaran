# =============================================================================
# papers.yml — single source of truth for the Publications page.
#
# The Publications page (publications.qmd) renders from this file via a Quarto
# listing + custom template (_templates/publications.ejs). To add a paper, add
# one entry here (or run `python scripts/add_paper.py ...`). Do NOT edit the
# publications page HTML directly.
#
# Fields:
#   title    (required)  Paper title, no trailing period.
#   author   (required)  Full author string. "Karunakaran, A." is auto-bolded.
#   year     (required)  Publication year (integer). Used for grouping/sorting.
#   venue    (required)  Journal or book title (rendered in italics).
#   volume / issue / pages   (optional) Bibliographic detail.
#   doi      (optional)  Bare DOI, e.g. 10.1177/00018392241256303 (no URL).
#   pdf      (optional)  Filename in files/papers/ — shows a PDF button.
#   equal    (optional)  true -> shows an "Equal Contribution" badge.
#   type     (required)  "Journal Article" | "Book Chapter" | "Working Paper".
#   categories (required) List used by the on-page filter (usually [<type>]).
#   date     (required)  YYYY-MM-DD, used by Quarto listing to sort (newest first).
# =============================================================================

